
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7c27d"/>
      <stop offset="50%" stop-color="#cfa75e"/>
      <stop offset="100%" stop-color="#a87f3a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="600" fill="#111111"/>

  <!-- Shield shape -->
  <path d="M300 60 
           L500 140 
           L500 300 
           C500 420 410 500 300 540 
           C190 500 100 420 100 300 
           L100 140 Z"
        fill="none"
        stroke="url(#gold)"
        stroke-width="10"/>

  <!-- Inner circle -->
  <circle cx="300" cy="270" r="120" fill="none" stroke="url(#gold)" stroke-width="6"/>

  <!-- Main initials -->
  <text x="300" y="290"
        text-anchor="middle"
        font-family="Montserrat, Arial, sans-serif"
        font-size="90"
        font-weight="bold"
        fill="url(#gold)">EC</text>

  <!-- Brand name -->
  <text x="300" y="380"
        text-anchor="middle"
        font-family="Montserrat, Arial, sans-serif"
        font-size="42"
        letter-spacing="6"
        fill="url(#gold)">TECH</text>

  <!-- Decorative lines -->
  <line x1="200" y1="410" x2="400" y2="410" stroke="url(#gold)" stroke-width="3"/>
  <line x1="220" y1="430" x2="380" y2="430" stroke="url(#gold)" stroke-width="2"/>
</svg>
